version: "3.9"

services:
  backend:
    build: ./backend
    container_name: smartleads_backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: smartleads_frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

  mongo:
    image: mongo
    container_name: smartleads_mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: